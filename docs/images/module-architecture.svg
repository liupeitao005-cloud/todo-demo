<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .layer-title { font: 700 18px "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 16px "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 13px "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .band { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 12; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 8; }
      .accent-blue { fill: #eff6ff; stroke: #60a5fa; }
      .accent-green { fill: #ecfdf5; stroke: #34d399; }
      .accent-yellow { fill: #fffbeb; stroke: #fbbf24; }
      .accent-red { fill: #fef2f2; stroke: #f87171; }
      .line { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.4; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600" y="52" text-anchor="middle" class="title">Todo 待办与日程管理系统模块架构图</text>
  <text x="600" y="80" text-anchor="middle" class="subtitle">Vue 前端 + Spring Boot 后端 + MyBatis 数据访问 + MySQL 数据库存储</text>

  <rect x="60" y="115" width="1080" height="95" class="band"/>
  <text x="90" y="147" class="layer-title">前端展示层</text>
  <rect x="250" y="135" width="180" height="54" class="box accent-blue"/>
  <text x="340" y="158" text-anchor="middle" class="box-title">Vue Views</text>
  <text x="340" y="178" text-anchor="middle" class="box-text">页面、表单、列表、日历</text>
  <rect x="510" y="135" width="180" height="54" class="box accent-blue"/>
  <text x="600" y="158" text-anchor="middle" class="box-title">Vue Router</text>
  <text x="600" y="178" text-anchor="middle" class="box-text">页面路由跳转</text>
  <rect x="770" y="135" width="180" height="54" class="box accent-blue"/>
  <text x="860" y="158" text-anchor="middle" class="box-title">Axios API</text>
  <text x="860" y="178" text-anchor="middle" class="box-text">统一请求、携带 token</text>

  <rect x="60" y="245" width="1080" height="115" class="band"/>
  <text x="90" y="280" class="layer-title">后端接口层</text>
  <rect x="215" y="270" width="230" height="62" class="box accent-green"/>
  <text x="330" y="294" text-anchor="middle" class="box-title">Controller</text>
  <text x="330" y="315" text-anchor="middle" class="box-text">接收请求、参数校验、返回 Result</text>
  <rect x="500" y="270" width="190" height="62" class="box accent-yellow"/>
  <text x="595" y="294" text-anchor="middle" class="box-title">DTO / VO</text>
  <text x="595" y="315" text-anchor="middle" class="box-text">请求参数、响应视图对象</text>
  <rect x="745" y="270" width="230" height="62" class="box accent-red"/>
  <text x="860" y="294" text-anchor="middle" class="box-title">Interceptor + JWT</text>
  <text x="860" y="315" text-anchor="middle" class="box-text">登录拦截、解析用户身份</text>

  <rect x="60" y="395" width="1080" height="145" class="band"/>
  <text x="90" y="430" class="layer-title">业务服务层</text>
  <rect x="170" y="430" width="860" height="78" class="box"/>
  <text x="600" y="456" text-anchor="middle" class="box-title">Service</text>
  <text x="600" y="480" text-anchor="middle" class="box-text">用户、待办、任务、行程、日历、习惯、四象限、复习计划、提醒</text>
  <text x="600" y="500" text-anchor="middle" class="box-text">处理登录状态、业务规则、事务控制和核心流程闭环</text>

  <rect x="60" y="575" width="1080" height="105" class="band"/>
  <text x="90" y="610" class="layer-title">数据访问层</text>
  <rect x="250" y="600" width="220" height="54" class="box accent-green"/>
  <text x="360" y="623" text-anchor="middle" class="box-title">Mapper</text>
  <text x="360" y="643" text-anchor="middle" class="box-text">MyBatis SQL 操作</text>
  <rect x="730" y="600" width="220" height="54" class="box accent-blue"/>
  <text x="840" y="623" text-anchor="middle" class="box-title">MySQL</text>
  <text x="840" y="643" text-anchor="middle" class="box-text">业务数据持久化</text>

  <path d="M 430 162 L 510 162" class="line"/>
  <path d="M 690 162 L 770 162" class="line"/>
  <path d="M 860 189 L 860 270" class="line"/>
  <path d="M 745 301 L 445 301" class="dash"/>
  <path d="M 330 332 L 330 430 L 470 430" class="line"/>
  <path d="M 595 332 L 595 430" class="dash"/>
  <path d="M 600 508 L 600 627 L 470 627" class="line"/>
  <path d="M 470 627 L 730 627" class="line"/>

  <rect x="85" y="700" width="1030" height="36" fill="#f1f5f9" stroke="#cbd5e1" rx="8"/>
  <text x="600" y="723" text-anchor="middle" class="small">调用流程：页面操作 → Axios 请求 → Controller 接口 → Service 业务处理 → Mapper 数据访问 → MySQL 存储，返回时统一封装为 Result</text>
</svg>
